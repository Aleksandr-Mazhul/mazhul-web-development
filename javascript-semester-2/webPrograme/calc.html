<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Calculation</title>
  <style>
    * {
      font-family: Arial, Helvetica, sans-serif
    }

    input {
      width: 30pt;
    }
  </style>
</head>
<body>
<h1>Calculation</h1>
<input
  type="number"
  value="5"
  id="aaa"
/>
<input
  type="button"
  value="Go..."
/>
<p id="bbb"> tut budet cheto</p>

</body>
<script>
  let cnt = 0;
  document.querySelector("input[type='button']").addEventListener('click', handla)

  function handla() {
    cnt++;
    let x = document.querySelector("#aaa").value;
    let rez = Number(x) + 2;
    //document.querySelector("#bbb").innerHTML += "<br> rez " +cnt+ ":" + x + " times 2 = "  +rez;
    document.querySelector("#bbb").innerHTML += `<br> rez ${cnt}:${x} times 2 = ${rez}`;

  }
</script>
</html>
