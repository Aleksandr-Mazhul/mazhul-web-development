<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    content="width=device-width, initial-scale=1.0"
    name="viewport"
  >

  <title>
    Заказ товара
  </title>

  <link
    href="style.css"
    rel="stylesheet"
  >

</head>

<body>

<form class="form">

  <h1 class="title">
    Заказ товара
  </h1>

  <!-- Название -->

  <label for="product">
    Название
  </label>

  <input
    autofocus
    id="product"

    name="product"

    pattern="[0-9]{3}-[A-Z]{3}\/[a-z]{3}\{[0-9]{2}\}"
    placeholder="123-ABC/abc{12}"

    required

    title="Формат: 123-ABC/abc{12}"

    type="text"
  >

  <!-- Имя -->

  <label for="name">
    Имя
  </label>

  <input
    autocomplete="name"

    id="name"
    name="name"

    placeholder="Введите имя"

    type="text"
  >

  <!-- Email -->

  <label for="email">
    E-mail
  </label>

  <input
    id="email"

    name="email"

    placeholder="example@mail.com"
    required

    type="email"
  >

  <!-- Цвет -->

  <label for="color">
    Цвет
  </label>

  <input
    class="color-input"

    id="color"
    name="color"

    type="color"
  >

  <!-- Количество -->

  <label for="count">
    Количество
  </label>

  <div class="quantity-control">

    <button
      aria-label="Уменьшить количество"
      class="quantity-btn minus"
      type="button"
    >
      −
    </button>

    <input
      id="count"
      max="100"
      min="1"
      name="count"
      required
      type="number"
      value="1"
    >

    <button
      aria-label="Увеличить количество"
      class="quantity-btn plus"
      type="button"
    >
      +
    </button>

  </div>

  <!-- Дата -->

  <label for="date">
    Дата
  </label>

  <div class="date-wrapper">

    <input
      id="date"
      name="date"
      required
      type="date"
    >

    <svg
      aria-hidden="true"
      class="calendar-icon"
      viewBox="0 0 24 24"
    >

      <rect
        height="16"
        rx="3"
        width="18"
        x="3"
        y="5"
      />

      <line
        x1="16"
        x2="16"
        y1="3"
        y2="7"
      />

      <line
        x1="8"
        x2="8"
        y1="3"
        y2="7"
      />

      <line
        x1="3"
        x2="21"
        y1="11"
        y2="11"
      />

    </svg>

  </div>

  <!-- Доставка -->

  <fieldset class="delivery">

    <legend>
      Способ доставки
    </legend>

    <label class="check">

      <input
        name="delivery"

        required

        type="radio"

        value="pickup"
      >

      <span>
        Самовывоз
      </span>

    </label>

    <label class="check">

      <input
        name="delivery"

        type="radio"

        value="courier"
      >

      <span>
        Курьером
      </span>

    </label>

  </fieldset>

  <!-- Пункт самовывоза -->

  <label for="pickup">
    Ближайший пункт самовывоза
  </label>

  <select
    id="pickup"

    name="pickup"
    required
  >

    <option value="">
      Выберите пункт
    </option>

    <option value="riga-plaza">
      Riga Plaza
    </option>

    <option value="alfa">
      Alfa
    </option>

    <option value="akropole">
      Akropole
    </option>

    <option value="spice">
      Spice
    </option>

    <option value="domina">
      Domina
    </option>

  </select>

  <!-- Вид упаковки -->

  <fieldset class="packaging">

    <legend>
      Вид упаковки
    </legend>

    <!-- Коробка -->

    <label class="package-card">

      <svg
        class="package-svg"
        viewBox="0 0 200 200"
      >

        <rect
          height="100"
          rx="12"
          width="120"
          x="40"
          y="50"
        />

        <line
          x1="100"
          x2="100"
          y1="50"
          y2="150"
        />

        <line
          x1="40"
          x2="160"
          y1="100"
          y2="100"
        />

      </svg>

      <span>
        Коробка
      </span>

      <input
        name="package"

        required

        type="radio"

        value="box"
      >

    </label>

    <!-- Подарочная -->

    <label class="package-card">

      <svg
        class="package-svg"
        viewBox="0 0 200 200"
      >

        <rect
          height="90"
          rx="10"
          width="120"
          x="40"
          y="60"
        />

        <line
          x1="100"
          x2="100"
          y1="60"
          y2="150"
        />

        <line
          x1="40"
          x2="160"
          y1="105"
          y2="105"
        />

        <path
          d="
            M100 60
            C70 20, 40 40, 80 80

            M100 60
            C130 20, 160 40, 120 80
          "
        />

      </svg>

      <span>
        Подарочная
      </span>

      <input
        name="package"

        type="radio"

        value="gift"
      >

    </label>

    <!-- Пакет -->

    <label class="package-card">

      <svg
        class="package-svg"
        viewBox="0 0 200 200"
      >

        <path
          d="
            M60 70
            L140 70
            L150 150
            L50 150
            Z
          "
        />

        <path
          d="
            M75 70
            C75 35, 125 35, 125 70
          "
        />

      </svg>

      <span>
        Пакет
      </span>

      <input
        name="package"

        type="radio"

        value="bag"
      >

    </label>

  </fieldset>

  <!-- Кнопка -->

  <button type="submit">
    Заказать
  </button>

</form>

<script src="script.js"></script>

</body>
</html>
