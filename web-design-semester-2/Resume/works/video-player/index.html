<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    content="width=device-width, initial-scale=1.0"
    name="viewport"
  />

  <title>Video Player</title>

  <link
    href="./css/style.css"
    rel="stylesheet"
  />
  <link
    href="./css/player.css"
    rel="stylesheet"
  />
  <link
    href="./css/animations.css"
    rel="stylesheet"
  />
</head>
<body>

<main class="page">

  <section class="player">

    <div class="player__video-wrapper">

      <video
        class="player__video"
        id="video"
        poster="./assets/video/poster.jpg"
        preload="metadata"
        src="./assets/video/video.mp4"
      ></video>

      <div class="player__overlay"></div>

      <div class="player__controls">

        <div class="player__timeline">

          <div class="timeline">

            <div
              class="timeline__progress"
              id="progress"
            ></div>

          </div>

        </div>

        <div class="player__bottom">

          <div class="player__left-controls">

            <button
              aria-label="Play or pause"
              class="player__button"
              id="play-btn"
            ></button>

            <div class="player__volume">

              <button
                aria-label="Mute or unmute"
                class="player__button"
                id="mute-btn"
              ></button>

              <div
                class="volume"
                id="volume-slider"
              >

                <div
                  class="volume__progress"
                  id="volume-progress"
                ></div>

              </div>

            </div>

            <span
              class="player__time"
              id="time"
            >
    00:00 / 00:00
  </span>

          </div>

          <div class="player__right-controls">

            <select
              class="player__speed"
              id="speed"
            >
              <option value="0.5">0.5x</option>
              <option value="0.75">0.75x</option>
              <option
                selected
                value="1"
              >1x
              </option>
              <option value="1.25">1.25x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
            </select>

            <button
              aria-label="Toggle fullscreen"
              class="player__button"
              id="fullscreen-btn"
            ></button>

          </div>

        </div>

      </div>

    </div>

  </section>

</main>

<script
  src="./js/main.js"
  type="module"
></script>

</body>
</html>
