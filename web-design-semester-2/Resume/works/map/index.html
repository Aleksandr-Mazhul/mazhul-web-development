<!DOCTYPE html>
<html lang="ru">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Интерактивная карта Бразилии
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>
<body>

<main class="page">

  <header class="hero">

    <h1>
      Интерактивная карта Бразилии
    </h1>

    <p>
      Наведите курсор на регион
    </p>

  </header>

  <section class="map-section">

    <div class="map-card">

      <div id="map-root"></div>

    </div>

  </section>

  <section class="legend-section">

    <h2>
      Легенда карты
    </h2>

    <table class="legend-table">

      <thead>

        <tr>
          <th>Регион</th>
          <th>Ссылка</th>
        </tr>

      </thead>

      <tbody>

        <tr>
          <td>
            <span class="legend-region-label">
              <span class="legend-badge">1</span>
              <span>Северный</span>
            </span>
          </td>

          <td>
            <a
              href="https://guide.planetofhotels.com/ru/braziliya/severnyy-region"
              target="_blank"
            >
              Открыть
            </a>
          </td>
        </tr>

        <tr>
          <td>
            <span class="legend-region-label">
              <span class="legend-badge">2</span>
              <span>Центрально-западный</span>
            </span>
          </td>

          <td>
            <a
              href="https://guide.planetofhotels.com/ru/braziliya/centralno-zapadnyy-region"
              target="_blank"
            >
              Открыть
            </a>
          </td>
        </tr>

        <tr>
          <td>
            <span class="legend-region-label">
              <span class="legend-badge">3</span>
              <span>Северо-восточный</span>
            </span>
          </td>

          <td>
            <a
              href="https://guide.planetofhotels.com/ru/braziliya/severo-vostochnyy-region"
              target="_blank"
            >
              Открыть
            </a>
          </td>
        </tr>

      </tbody>

    </table>

  </section>

</main>

<div
  id="tooltip"
  class="tooltip"
></div>

<script
  type="module"
  src="script.js"
></script>

</body>
</html>
