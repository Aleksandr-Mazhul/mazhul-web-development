<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Заказ товара
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<form class="form">

  <h1 class="title">
    Заказ товара
  </h1>

  <!-- ID товара -->

  <label for="product">
    Название
  </label>

  <input
    autofocus
    required

    type="text"

    id="product"
    name="product"

    placeholder="123-ABC/abc{12}"

    pattern="[0-9]{3}-[A-Z]{3}\/[a-z]{3}\{[0-9]{2}\}"

    title="Формат: 123-ABC/abc{12}"
  >

  <!-- Имя -->

  <label for="name">
    Имя
  </label>

  <input
    type="text"

    id="name"
    name="name"

    autocomplete="name"

    placeholder="Введите имя"
  >

  <!-- Email -->

  <label for="email">
    E-mail
  </label>

  <input
    required

    type="email"

    id="email"
    name="email"

    placeholder="example@mail.com"
  >

  <!-- Цвет -->

  <label for="color">
    Цвет
  </label>

  <input
    type="color"

    id="color"
    name="color"

    class="color-input"
  >

  <!-- Количество -->

  <label for="count">
    Количество
  </label>

  <input
    required

    type="number"

    id="count"
    name="count"

    min="1"
    max="100"

    value="1"
  >

  <!-- Дата -->

  <label for="date">
    Дата
  </label>

  <input
    required

    type="date"

    id="date"
    name="date"
  >

  <!-- Доставка -->

  <fieldset class="delivery">

    <legend>
      Способ доставки
    </legend>

    <label class="check">

      <input
        required

        type="radio"

        name="delivery"

        value="pickup"
      >

      <span>
                Самовывоз
            </span>

    </label>

    <label class="check">

      <input
        type="radio"

        name="delivery"

        value="courier"
      >

      <span>
                Курьером
            </span>

    </label>

  </fieldset>

  <!-- Пункт самовывоза -->

  <label for="pickup">
    Ближайший пункт самовывоза
  </label>

  <select
    required

    id="pickup"
    name="pickup"
  >

    <option value="">
      Выберите пункт
    </option>

    <option value="riga-plaza">
      Riga Plaza
    </option>

    <option value="alfa">
      Alfa
    </option>

    <option value="akropole">
      Akropole
    </option>

    <option value="spice">
      Spice
    </option>

    <option value="domina">
      Domina
    </option>

  </select>

  <!-- Вид упаковки -->

  <fieldset class="packaging">

    <legend>
      Вид упаковки
    </legend>

    <!-- Коробка -->

    <label class="package-card">

      <svg
        viewBox="0 0 200 200"
        class="package-svg"
      >

        <rect
          x="40"
          y="50"
          width="120"
          height="100"
          rx="12"
        />

        <line
          x1="100"
          y1="50"
          x2="100"
          y2="150"
        />

        <line
          x1="40"
          y1="100"
          x2="160"
          y2="100"
        />

      </svg>

      <span>
                Коробка
            </span>

      <input
        required

        type="radio"

        name="package"

        value="box"
      >

    </label>

    <!-- Подарочная -->

    <label class="package-card">

      <svg
        viewBox="0 0 200 200"
        class="package-svg"
      >

        <rect
          x="40"
          y="60"
          width="120"
          height="90"
          rx="10"
        />

        <line
          x1="100"
          y1="60"
          x2="100"
          y2="150"
        />

        <line
          x1="40"
          y1="105"
          x2="160"
          y2="105"
        />

        <path
          d="
                        M100 60
                        C70 20, 40 40, 80 80

                        M100 60
                        C130 20, 160 40, 120 80
                    "
        />

      </svg>

      <span>
                Подарочная
            </span>

      <input
        type="radio"

        name="package"

        value="gift"
      >

    </label>

    <!-- Пакет -->

    <label class="package-card">

      <svg
        viewBox="0 0 200 200"
        class="package-svg"
      >

        <path
          d="
                        M60 70
                        L140 70
                        L150 150
                        L50 150
                        Z
                    "
        />

        <path
          d="
                        M75 70
                        C75 35, 125 35, 125 70
                    "
        />

      </svg>

      <span>
                Пакет
            </span>

      <input
        type="radio"

        name="package"

        value="bag"
      >

    </label>

  </fieldset>

  <!-- Кнопка -->

  <button type="submit">
    Заказать
  </button>

</form>

<script src="script.js"></script>

</body>
</html>
