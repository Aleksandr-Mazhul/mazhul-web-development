

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Видео и аудио</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
    <audio src="witch.mp3" controls muted class="audio"></audio>
    <div class="video-container">
      <video
        id="video"
        src="wunschpunsch.mp4"
        width="auto"
        height="auto"
        preload="metadata"
        poster="wunschpunsch.jpg"
      ></video>
      <input type="range" class="range-time" id="range" value="0" />
      <div class="buttons">
        <div class="buttons-play">
          <img src="buttoms/left.png" class="icon" id="back" />
          <img src="buttoms/play.png" class="icon" id="play" />
          <img src="buttoms/right.png" class="icon" id="next" />
        </div>
        <p id="timer">00:00</p>
        <div class="voice-buttons">
          <img src="buttoms/volume.png" class="icon" id="volume_stop" />
          <input
            class="volume-set rangeVolume"
            type="range"
            step="0.1"
            min="0"
            max="1"
            value="0.5"
            id="volume"
          />
    </div>
</div>
    <script src="script.js"></script>
  </body>
</html>
