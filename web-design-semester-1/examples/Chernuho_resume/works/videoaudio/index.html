<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Видео и аудио</title>
    <link rel="stylesheet" href="style.css"/>
  </head>
  <body>
    <div class="container">
    <audio src="Koshechki%20Horoshie.mp3" controls muted class="audio"></audio>
    <div class="video">
      <video
        id="video"
        src="img/cats.MP4"
        width="auto"
        height="auto"
        preload="metadata"
        poster="img/cat.jpg"
       ></video>
      <input type="range" class="range-time" id="range" value="0" />
      <div class="buttons">
        <div class="buttons-play">
          <img src="img/previous.png" class="icon" id="previous" />
          <img src="img/play.png" class="icon" id="play" />
          <img src="img/next.png" class="icon" id="next" />
        </div>
        <p id="timer">00:00</p>
        <div class="volume-buttons">
          <img src="img/volume.png" class="icon" id="volume_stop" />
          <input
            class="volume-set rangeVolume"
            type="range"
            step="0.1"
            min="0" max="1"
            value="0.5"
            id="volume"
          />
        </div>
        <div class="buttons"></div>
        <div class="buttons playback-rate">
          <span id="playback_rate"></span>
            <img src="img/volumeup.png" class="arrow" id="faster"/>
            <img src="img/volumedown.png" class="arrow" id="slower"/>
        </div>
      </div>
    </div>
</div>
    <script src="player.js"></script>
  </bodyf
</html>
