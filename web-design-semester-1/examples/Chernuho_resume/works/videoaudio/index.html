<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    content="width=device-width, initial-scale=1.0"
    name="viewport"
  />
  <title>Видео и аудио</title>
  <link
    href="style.css"
    rel="stylesheet"
  />
</head>
<body>
<div class="container">
  <audio
    class="audio"
    controls
    muted
    src="Koshechki%20Horoshie.mp3"
  ></audio>
  <div class="video">
    <video
      height="auto"
      id="video"
      poster="img/cat.jpg"
      preload="metadata"
      src="img/cats.MP4"
      width="auto"
    ></video>
    <input
      class="range-time"
      id="range"
      type="range"
      value="0"
    />
    <div class="buttons">
      <div class="buttons-play">
        <img
          class="icon"
          id="previous"
          src="img/previous.png"
        />
        <img
          class="icon"
          id="play"
          src="img/play.png"
        />
        <img
          class="icon"
          id="next"
          src="img/next.png"
        />
      </div>
      <p id="timer">00:00</p>
      <div class="volume-buttons">
        <img
          class="icon"
          id="volume_stop"
          src="img/volume.png"
        />
        <input
          class="volume-set rangeVolume"
          id="volume"
          max="1"
          min="0"
          step="0.1"
          type="range"
          value="0.5"
        />
      </div>
      <div class="buttons"></div>
      <div class="buttons playback-rate">
        <span id="playback_rate"></span>
        <img
          class="arrow"
          id="faster"
          src="img/volumeup.png"
        />
        <img
          class="arrow"
          id="slower"
          src="img/volumedown.png"
        />
      </div>
    </div>
  </div>
</div>
<script src="player.js"></script>
</bodyf
</html>
